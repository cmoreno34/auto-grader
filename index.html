<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Grader — Big Data Final Exam</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="grader.js"></script>
</head>
<body>
<header>
  <h1>Auto Grader — Big Data Final Exam</h1>
  <p class="subtitle">Drop one student xlsx, several xlsx, or a zip of submissions. Grading is 100% local in your browser — nothing is uploaded.</p>
</header>

<main>
  <label id="drop-zone" class="drop-zone" for="file-input">
    <p class="drop-msg"><strong>Drag &amp; drop</strong> Excel files or a ZIP here</p>
    <p class="drop-sub">or click to browse — you can drop more files later, they append</p>
    <input type="file" id="file-input" multiple accept=".xlsx,.xlsm,.zip" hidden>
  </label>

  <section id="status" class="status hidden"></section>

  <section id="results"></section>

  <section id="export-bar" class="export-bar hidden">
    <button id="export-csv">Export all results as CSV</button>
    <button id="clear-btn">Clear</button>
  </section>
</main>

<footer>
  <p>5 exercises supported: <span id="supported-list">loading…</span></p>
</footer>

<script src="app.js"></script>
</body>
</html>
